<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenStar 路线规划验证台 v4 - Leaflet 实景渲染</title>
    <!-- ============================================================================
    文件: test_route_map.html
    基准版本: test_route_map.html v3 (纯Canvas版)
    修改内容 / Changes:
      [重构] 采用高德 API + Leaflet 混合架构！
      [重构] 抛弃空白的 Canvas，引入 Leaflet 开源地图引擎进行实景瓦片渲染。
      [重构] 高德的 JS API 会因诸多安全校验、WebGL 等特性被代理干扰导致瓦片空白。但我们直接使用 Leaflet 加载高德的普通栅格图片瓦片，既能拥有真实美丽的地图实景，又能完美绕过代理对高德 JS 内核的干扰！
    ============================================================================ -->
    
    <!-- Leaflet 开源地图引擎 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 高德 API (仅作 Geocoding 和 Routing 数据计算) -->
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'fa5b4914b560026b23e2c7ae1bc757d4' };
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=040c3af03bab9232ab67e0d232838b28&plugin=AMap.Geocoder,AMap.Driving,AMap.Walking"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; overflow: hidden; }
        .header { background: linear-gradient(135deg, #065f46, #0d9488); padding: 14px 20px; height: 56px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 18px; font-weight: 700; }
        .header span { font-size: 10px; opacity: 0.7; }
        .main { display: flex; height: calc(100vh - 56px); }
        .panel { width: 380px; min-width: 380px; padding: 14px; overflow-y: auto; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .panel h2 { font-size: 14px; color: #10b981; margin-bottom: 8px; font-weight: 700; }
        
        .map-wrapper { flex: 1; position: relative; background: #111827; }
        #map-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        /* 增加地图滤镜，使其有科技感，不那么刺眼 */
        .dark-mode-map .leaflet-layer,
        .dark-mode-map .leaflet-control-zoom-in,
        .dark-mode-map .leaflet-control-zoom-out,
        .dark-mode-map .leaflet-control-attribution {
          filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        .log-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .log { padding: 6px 8px; margin-bottom: 4px; border-radius: 6px; font-size: 10px; line-height: 1.5; }
        .log.info { background: #1e3a5f; border-left: 3px solid #3b82f6; }
        .log.ok { background: #14532d; border-left: 3px solid #22c55e; }
        .log.err { background: #450a0a; border-left: 3px solid #ef4444; }
        .log.warn { background: #422006; border-left: 3px solid #f59e0b; }
        .log b { font-weight: 700; }
        .stop-chip { display: inline-flex; align-items: center; gap: 4px; background: #334155; padding: 4px 10px; border-radius: 20px; margin: 2px 3px; font-size: 10px; }
        .stop-chip .n { width: 18px; height: 18px; border-radius: 50%; background: #10b981; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; }
        .summary-box { background: linear-gradient(135deg, #065f46, #0d9488); padding: 12px; border-radius: 12px; margin-top: 10px; font-size: 12px; flex-shrink: 0; }
        .summary-box .row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .divider { height: 1px; background: #334155; margin: 10px 0; }
        select { width: 100%; padding: 7px; border-radius: 8px; background: #334155; color: white; border: 1px solid #475569; font-size: 11px; margin-top: 6px; }
        
        .custom-stop-icon { background: none; border: none; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🌍 GreenStar 结合渲染引擎 v4</h1>
            <span>高德 API 提供算法 · Leaflet 提供舒适实景渲染 · 完美绕开网络拦截</span>
        </div>
    </div>
    <div class="main">
        <div class="panel">
            <h2>📋 执行引擎日志</h2>
            <div class="log-container" id="logs"></div>
            <div class="divider"></div>
            <h2>📍 站点列表</h2>
            <div id="chips"></div>
            <div id="route-ctl" style="display:none">
                <div class="divider"></div>
                <h2>🗺️ 路线方案</h2>
                <select id="mode" onchange="switchMode()">
                    <option value="drive">🚗 驾车路线（精算）</option>
                    <option value="walk">🚶 步行路线（分段解算）</option>
                    <option value="straight">📐 直线飞线（仅预览节点）</option>
                </select>
            </div>
            <div id="summary"></div>
        </div>
        <div class="map-wrapper" id="map-wrapper">
            <div id="map-container" class="dark-mode-map"></div>
        </div>
    </div>

<script>
// ========= NER 提取 =========
function extractStops(text) {
    const pats = [/\*\*([^*]{2,15})\*\*/g, /「([^」]{2,15})」/g, /【([^】]{2,15})】/g, /→\s*([^\s→,，。]{2,12})/g, /前往\s*([^\s,，。（(]{2,12})/g];
    const seen = new Set(), out = [];
    for (const p of pats) { let m; while ((m = p.exec(text)) !== null) { const n = m[1].trim().replace(/[【】「」『』《》\[\]]/g,'').trim(); if (n.length>=2&&n.length<=15&&!['建议','提示','注意','推荐','公里','小时'].some(w=>n.includes(w))&&!seen.has(n)){seen.add(n);out.push(n);} } }
    return out.slice(0,10);
}

// ========= 日志面板 =========
const $log = document.getElementById('logs');
function L(m, t='info') { const d=document.createElement('div'); d.className='log '+t; d.innerHTML=m; $log.appendChild(d); $log.scrollTop=1e6; }

// ========= 全局状态 =========
let stops = []; // {name, lng, lat}
let routePath = []; // [{lng,lat}]

let lMap = null;
let pathLayer = null;
let markersLayer = null;

// ========= AI 攻略模拟数据 =========
const PLAN = `清晨前往 **【成都大熊猫繁育研究基地】** 观看熊猫，随后地铁直达 **【天府广场】**。
步行至 **「人民公园」** 鹤鸣茶社体验盖碗茶，然后前往 **【太古里】** 与 **【春熙路】** 打卡。
下午前往 **「宽窄巷子」** 游览，然后步行至 **【青羊宫】**。
傍晚前往 **武侯祠**，最后夜游打卡 **「锦里古街」** 结束行程。`;

// ========= 超时保护的高德 Geocode =========
function geocode(name) {
    return new Promise((resolve) => {
        const timer = setTimeout(() => { L(`<b>⏰ 超时</b> ${name} 坐标解算超时(5s)！被自动跳过。`, 'warn'); resolve(null); }, 5000);
        try {
            const g = new AMap.Geocoder({city:'成都'});
            g.getLocation(name, (s, r) => {
                clearTimeout(timer);
                if (s==='complete'&&r.geocodes?.length) { const loc=r.geocodes[0].location; resolve({lng:loc.getLng(),lat:loc.getLat()}); }
                else resolve(null);
            });
        } catch(e) { clearTimeout(timer); resolve(null); }
    });
}

// ========= 初始化 Leaflet 渲染地图 =========
function initLeafletMap() {
    L('🎨 <b>Leaflet</b> 引擎正在挂载实景瓦片底图...');
    lMap = L.map('map-container', {
        zoomControl: false, 
        attributionControl: false
    }).setView([30.6574, 104.0659], 12);
    
    L.control.zoom({position: 'topright'}).addTo(lMap);
    
    // 我们直接加载高德的栅格瓦片 URL ！！
    // 这只发出简单的图片 HTTP Get 请求，不会触发 AMap JS API 任何反代理安全机制。
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: ['1', '2', '3', '4'],
        maxZoom: 18,
    }).addTo(lMap);

    markersLayer = L.layerGroup().addTo(lMap);
    L('✅ <b>Leaflet</b> 实景地图加载就绪！', 'ok');
}

// ========= 渲染标记和路线 (更新视图) =========
function drawMap() {
    if(!lMap) return;
    markersLayer.clearLayers();
    if(pathLayer) { lMap.removeLayer(pathLayer); pathLayer = null; }
    
    if (stops.length === 0) return;
    
    // 渲染路线
    if (routePath.length > 1) {
        // Leaflet使用的是 [lat, lng] 数组
        const latlngs = routePath.map(p => [p.lat, p.lng]);
        pathLayer = L.polyline(latlngs, {
            color: '#10b981', weight: 6, opacity: 0.9, lineJoin: 'round'
        }).addTo(lMap);
    } else if (stops.length > 1) {
        // 还没规划路线则画直线
        const latlngs = stops.map(s => [s.lat, s.lng]);
        pathLayer = L.polyline(latlngs, {
            color: '#94a3b8', weight: 3, dashArray: '8, 8', opacity: 0.8
        }).addTo(lMap);
    }
    
    const bounds = L.latLngBounds();
    
    // 渲染带有名称的精美节点
    stops.forEach((s, idx) => {
        const iconHtml = \`
            <div style="background:linear-gradient(135deg,#10b981,#059669); color:white; width:28px; height:28px; border-radius:50%; border:2px solid white; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; box-shadow:0 3px 8px rgba(0,0,0,0.4); z-index: 1000; position:relative;">\${idx+1}</div>
            <div style="position:absolute; top:-3px; left:32px; background:rgba(15, 23, 42, 0.85); backdrop-filter: blur(4px); padding:4px 8px; border-radius:6px; font-size:11px; color:#d1fae5; font-weight:bold; box-shadow:0 2px 6px rgba(0,0,0,0.3); white-space:nowrap; border:1px solid rgba(16,185,129,0.3); pointer-events:none;">\${s.name}</div>
        \`;
        
        const customIcon = L.divIcon({
            html: iconHtml,
            className: 'custom-stop-icon',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });
        
        L.marker([s.lat, s.lng], {icon: customIcon}).addTo(markersLayer);
        bounds.extend([s.lat, s.lng]);
    });
    
    if (routePath.length > 0) routePath.forEach(p => bounds.extend([p.lat, p.lng]));
    if (stops.length > 0) lMap.fitBounds(bounds, {padding: [50, 50]});
}

// ========= 路线规划算法引擎 =========
function drivingRoute() {
    return new Promise(resolve => {
        const timer = setTimeout(()=>{L('<b>⏰</b> 驾车算法调用超时(15s)', 'warn'); resolve(null);}, 15000);
        AMap.plugin('AMap.Driving', ()=> {
            const d = new AMap.Driving({policy:0, ferry:0});
            const o = new AMap.LngLat(stops[0].lng, stops[0].lat);
            const dest = new AMap.LngLat(stops[stops.length-1].lng, stops[stops.length-1].lat);
            const wps = stops.slice(1,-1).map(s=>new AMap.LngLat(s.lng,s.lat));
            d.search(o, dest, {waypoints:wps}, (st,r)=>{
                clearTimeout(timer);
                if(st==='complete'&&r.routes?.length){
                    const path=[];
                    for(const step of r.routes[0].steps||[]){if(step.path)for(const p of step.path)path.push({lng:p.lng,lat:p.lat});}
                    resolve({path, dist:r.routes[0].distance, time:r.routes[0].time});
                } else { L(\`<b>❌</b> 高德算法拒绝请求: \${st}\`, 'err'); resolve(null); }
            });
        });
    });
}

function walkSegment(from, to) {
    return new Promise(resolve => {
        const timer = setTimeout(()=>resolve(null), 8000);
        AMap.plugin('AMap.Walking', ()=> {
            const w = new AMap.Walking();
            w.search(new AMap.LngLat(from.lng,from.lat), new AMap.LngLat(to.lng,to.lat), (st,r)=>{
                clearTimeout(timer);
                if(st==='complete'&&r.routes?.length){
                    const path=[];
                    for(const step of r.routes[0].steps||[]){if(step.path)for(const p of step.path)path.push({lng:p.lng,lat:p.lat});}
                    resolve({path, dist:r.routes[0].distance, time:r.routes[0].time});
                } else resolve(null);
            });
        });
    });
}

// ========= 主流程控制 =========
async function main() {
    L('🚀 <b>启动</b> GreenStar v4 双引擎渲染平台初始化...');

    initLeafletMap(); // 先挂载漂亮地图

    // 1. NER
    const names = extractStops(PLAN);
    L(\`🔍 <b>NER</b> 模型提取到 \${names.length} 个锚点\`, 'ok');

    // 2. Geocode
    L('📡 <b>Geocoding</b> 并发进行空间坐标映射解算...');
    for (let i = 0; i < names.length; i++) {
        const coord = await geocode(names[i]);
        if (coord) {
            stops.push({name: names[i], ...coord});
            L(\`📍 <b>#\${i+1}</b> \${names[i]} → [\${coord.lng.toFixed(4)}, \${coord.lat.toFixed(4)}]\`, 'ok');
        } else {
            L(\`❌ <b>#\${i+1}</b> \${names[i]} 解算失败\`, 'err');
        }
    }

    // 去重
    const seen = new Set();
    stops = stops.filter(s => { if(seen.has(s.name)) return false; seen.add(s.name); return true; });

    // 渲染芯片面板
    const $chips = document.getElementById('chips');
    stops.forEach((s,i)=>{ $chips.innerHTML += \`<div class="stop-chip"><div class="n">\${i+1}</div>\${s.name}</div>\`; });

    // 画线初视图
    drawMap();

    if (stops.length < 2) { L('⚠️ 有效站点太少，无法激活算法', 'warn'); return; }
    document.getElementById('route-ctl').style.display = 'block';

    // 3. 算法计算
    L('🚗 <b>Driving Algorithm</b> 连接集群结算总路线模型...');
    const dr = await drivingRoute();
    if (dr) {
        routePath = dr.path;
        const km = (dr.dist/1000).toFixed(1);
        const min = Math.round(dr.time/60);
        L(\`✅ <b>路线融合完毕</b>: 贯穿全域 \${km}km, 预估 \${min}分, 包含 \${dr.path.length} 条向量\`, 'ok');
        renderSummary('🚗 智能驾车解算', km+' km', min+' 分钟');
        drawMap();
    } else {
        routePath = stops.map(s=>({lng:s.lng,lat:s.lat}));
        drawMap();
    }
}

async function switchMode() {
    const mode = document.getElementById('mode').value;
    if (mode === 'straight') {
        routePath = stops.map(s=>({lng:s.lng,lat:s.lat}));
        renderSummary('📐 无偏向量连线', '—', '—');
        drawMap();
    } else if (mode === 'drive') {
        L('🚗 驱动驾车模型计算中...');
        const dr = await drivingRoute();
        if(dr){routePath=dr.path; renderSummary('🚗 智能驾车解算',(dr.dist/1000).toFixed(1)+' km',Math.round(dr.time/60)+' 分钟'); drawMap();}
    } else if (mode === 'walk') {
        L('🚶 实例化分段步行分析网络...');
        routePath = [];
        let totalD=0, totalT=0;
        for(let i=0;i<stops.length-1;i++){
            const r = await walkSegment(stops[i], stops[i+1]);
            if(r){ routePath.push(...r.path); totalD+=r.dist; totalT+=r.time;
                L(\`🔗 <b>分段 \${i+1}</b> \${stops[i].name}→\${stops[i+1].name}: \${(r.dist/1000).toFixed(2)}km\`, 'ok');
            } else { L(\`⚠️ \${stops[i].name}→\${stops[i+1].name} 断层\`, 'warn'); }
        }
        renderSummary('🚶 全局步行拟合',(totalD/1000).toFixed(1)+' km',Math.round(totalT/60)+' 分钟');
        drawMap();
    }
}

function renderSummary(title, dist, time) {
    document.getElementById('summary').innerHTML = \`<div class="summary-box"><div class="row"><b style="color:#d1fae5; font-size:14px; margin-bottom: 6px;">\${title}</b></div><div class="row"><span style="color:#94a3b8">物理距离</span><b style="color:#34d399">\${dist}</b></div><div class="row"><span style="color:#94a3b8">时间拟合</span><b style="color:#38bdf8">\${time}</b></div><div class="row"><span style="color:#94a3b8">触达靶点</span><b>\${stops.length} 个</b></div></div>\`;
}

// 延迟启动规避渲染堵塞
window.addEventListener('load', () => setTimeout(main, 400));
</script>
</body>
</html>
