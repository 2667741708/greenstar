<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenStar 路线规划验证台 v3 - 纯 Canvas 渲染</title>
    <!-- ============================================================================
    文件: test_route_map.html
    基准版本: test_route_map.html v2 (AMap 瓦片渲染空白版)
    修改内容 / Changes:
      [重写] 彻底弃用 AMap 瓦片渲染，改用纯 Canvas 自绘地图坐标系
      [重写] 使用高德 REST API (JS API 内嵌 JSONP) 仅做 Geocoding，不依赖地图组件
      [新增] 基于 Canvas 2D 的实时路线动画渲染引擎
      [REWRITE] Replaced AMap tile-based map with pure Canvas coordinate rendering
      [NEW] Canvas 2D-based route animation engine
    ============================================================================ -->
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'fa5b4914b560026b23e2c7ae1bc757d4' };
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=040c3af03bab9232ab67e0d232838b28&plugin=AMap.Geocoder,AMap.Driving,AMap.Walking"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; overflow: hidden; }
        .header { background: linear-gradient(135deg, #065f46, #0d9488); padding: 14px 20px; height: 56px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 18px; font-weight: 700; }
        .header span { font-size: 10px; opacity: 0.7; }
        .main { display: flex; height: calc(100vh - 56px); }
        .panel { width: 380px; min-width: 380px; padding: 14px; overflow-y: auto; background: #1e293b; border-right: 1px solid #334155; }
        .panel h2 { font-size: 14px; color: #10b981; margin-bottom: 8px; font-weight: 700; }
        .canvas-wrapper { flex: 1; position: relative; background: #111827; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .log { padding: 6px 8px; margin-bottom: 4px; border-radius: 6px; font-size: 10px; line-height: 1.5; }
        .log.info { background: #1e3a5f; border-left: 3px solid #3b82f6; }
        .log.ok { background: #14532d; border-left: 3px solid #22c55e; }
        .log.err { background: #450a0a; border-left: 3px solid #ef4444; }
        .log.warn { background: #422006; border-left: 3px solid #f59e0b; }
        .log b { font-weight: 700; }
        .stop-chip { display: inline-flex; align-items: center; gap: 4px; background: #334155; padding: 4px 10px; border-radius: 20px; margin: 2px 3px; font-size: 10px; }
        .stop-chip .n { width: 18px; height: 18px; border-radius: 50%; background: #10b981; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; }
        .summary-box { background: linear-gradient(135deg, #065f46, #0d9488); padding: 12px; border-radius: 12px; margin-top: 10px; font-size: 12px; }
        .summary-box .row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .divider { height: 1px; background: #334155; margin: 10px 0; }
        select { width: 100%; padding: 7px; border-radius: 8px; background: #334155; color: white; border: 1px solid #475569; font-size: 11px; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🌍 GreenStar 路线规划验证台 v3</h1>
            <span>Canvas 纯坐标渲染 · 无瓦片依赖 · NER → Geocode → Route → Draw</span>
        </div>
    </div>
    <div class="main">
        <div class="panel">
            <h2>📋 执行日志</h2>
            <div id="logs"></div>
            <div class="divider"></div>
            <h2>📍 站点</h2>
            <div id="chips"></div>
            <div id="route-ctl" style="display:none">
                <div class="divider"></div>
                <h2>🗺️ 路线方案</h2>
                <select id="mode" onchange="switchMode()">
                    <option value="drive">🚗 驾车路线</option>
                    <option value="walk">🚶 步行路线（分段）</option>
                    <option value="straight">📐 直线连接（无 API）</option>
                </select>
            </div>
            <div id="summary"></div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="cv"></canvas>
        </div>
    </div>

<script>
// ========= NER（同 routePlanner.ts）=========
function extractStops(text) {
    const pats = [/\*\*([^*]{2,15})\*\*/g, /「([^」]{2,15})」/g, /【([^】]{2,15})】/g, /→\s*([^\s→,，。]{2,12})/g, /前往\s*([^\s,，。（(]{2,12})/g];
    const seen = new Set(), out = [];
    for (const p of pats) { let m; while ((m = p.exec(text)) !== null) { const n = m[1].trim().replace(/[【】「」『』《》\[\]]/g,'').trim(); if (n.length>=2&&n.length<=15&&!['建议','提示','注意','推荐','公里','小时'].some(w=>n.includes(w))&&!seen.has(n)){seen.add(n);out.push(n);} } }
    return out.slice(0,10);
}

// ========= 日志 =========
const $log = document.getElementById('logs');
function L(m, t='info') { const d=document.createElement('div'); d.className='log '+t; d.innerHTML=m; $log.appendChild(d); $log.scrollTop=1e6; }

// ========= 状态 =========
let stops = []; // {name, lng, lat}
let routePath = []; // [{lng,lat}]
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ========= AI 攻略 =========
const PLAN = `清晨前往 **【成都大熊猫繁育研究基地】** 观看熊猫，随后地铁直达 **【天府广场】**。
步行至 **「人民公园」** 鹤鸣茶社体验盖碗茶，然后前往 **【太古里】** 与 **【春熙路】** 打卡。
下午前往 **「宽窄巷子」** 游览，然后步行至 **【青羊宫】**。
傍晚前往 **武侯祠**，最后夜游打卡 **「锦里古街」** 结束行程。`;

// ========= Geocode（串行，带超时保护） =========
function geocode(name) {
    return new Promise((resolve) => {
        const timer = setTimeout(() => { L(`<b>⏰ 超时</b> ${name} geocode 超时(5s)，跳过`, 'warn'); resolve(null); }, 5000);
        try {
            const g = new AMap.Geocoder({city:'成都'});
            g.getLocation(name, (s, r) => {
                clearTimeout(timer);
                if (s==='complete'&&r.geocodes?.length) { const loc=r.geocodes[0].location; resolve({lng:loc.getLng(),lat:loc.getLat()}); }
                else resolve(null);
            });
        } catch(e) { clearTimeout(timer); resolve(null); }
    });
}

// ========= Canvas 渲染引擎 =========
function resizeCanvas() {
    const wr = cv.parentElement.getBoundingClientRect();
    cv.width = wr.width * devicePixelRatio;
    cv.height = wr.height * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

function geoToScreen(lng, lat) {
    if (stops.length === 0) return {x:0,y:0};
    const pad = 60;
    const wr = cv.parentElement.getBoundingClientRect();
    const w = wr.width - pad*2, h = wr.height - pad*2;
    let minLng=Infinity,maxLng=-Infinity,minLat=Infinity,maxLat=-Infinity;
    const all = [...stops.map(s=>({lng:s.lng,lat:s.lat})), ...routePath];
    for(const p of all){if(p.lng<minLng)minLng=p.lng;if(p.lng>maxLng)maxLng=p.lng;if(p.lat<minLat)minLat=p.lat;if(p.lat>maxLat)maxLat=p.lat;}
    const dLng=maxLng-minLng||0.01, dLat=maxLat-minLat||0.01;
    const scale = Math.min(w/dLng, h/dLat);
    const cx = pad + (w - dLng*scale)/2;
    const cy = pad + (h - dLat*scale)/2;
    return { x: cx + (lng - minLng)*scale, y: cy + (maxLat - lat)*scale }; // lat inverted
}

function drawMap() {
    resizeCanvas();
    const wr = cv.parentElement.getBoundingClientRect();
    const W = wr.width, H = wr.height;

    // 背景网格
    ctx.fillStyle = '#111827';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 0.5;
    for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // 标题
    ctx.fillStyle = '#374151';
    ctx.font = '12px "Noto Sans SC"';
    ctx.fillText('成都市 · GreenStar 地理坐标可视化 · WGS-84', 20, 24);

    if (stops.length === 0) return;

    // 画路线路径
    if (routePath.length > 1) {
        ctx.beginPath();
        const first = geoToScreen(routePath[0].lng, routePath[0].lat);
        ctx.moveTo(first.x, first.y);
        for (let i=1; i<routePath.length; i++) {
            const p = geoToScreen(routePath[i].lng, routePath[i].lat);
            ctx.lineTo(p.x, p.y);
        }
        ctx.strokeStyle = '#10b981';
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.stroke();

        // 方向箭头
        const step = Math.max(1, Math.floor(routePath.length/15));
        for (let i=step; i<routePath.length; i+=step) {
            const a = geoToScreen(routePath[i-1].lng, routePath[i-1].lat);
            const b = geoToScreen(routePath[i].lng, routePath[i].lat);
            const angle = Math.atan2(b.y-a.y, b.x-a.x);
            const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
            ctx.save();
            ctx.translate(mx, my);
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.moveTo(6,0); ctx.lineTo(-4,-4); ctx.lineTo(-4,4); ctx.closePath();
            ctx.fillStyle = '#34d399';
            ctx.fill();
            ctx.restore();
        }
    }

    // 站点连线（虚线备用）
    if (routePath.length <= 1) {
        ctx.beginPath();
        ctx.setLineDash([6,4]);
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 1.5;
        const f = geoToScreen(stops[0].lng, stops[0].lat);
        ctx.moveTo(f.x, f.y);
        for (let i=1; i<stops.length; i++) {
            const p = geoToScreen(stops[i].lng, stops[i].lat);
            ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // 站点标记
    stops.forEach((s, i) => {
        const p = geoToScreen(s.lng, s.lat);
        // 光晕
        const gr = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,24);
        gr.addColorStop(0,'rgba(16,185,129,0.3)');
        gr.addColorStop(1,'rgba(16,185,129,0)');
        ctx.fillStyle = gr;
        ctx.beginPath(); ctx.arc(p.x,p.y,24,0,Math.PI*2); ctx.fill();
        // 圆点
        ctx.beginPath(); ctx.arc(p.x,p.y,12,0,Math.PI*2);
        ctx.fillStyle = '#10b981'; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        // 编号
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px "Noto Sans SC"';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(i+1, p.x, p.y);
        // 名称
        ctx.fillStyle = '#d1fae5';
        ctx.font = '11px "Noto Sans SC"';
        ctx.textAlign = 'left';
        ctx.fillText(s.name, p.x+16, p.y-2);
        ctx.fillStyle = '#6b7280';
        ctx.font = '9px monospace';
        ctx.fillText(`[${s.lng.toFixed(4)}, ${s.lat.toFixed(4)}]`, p.x+16, p.y+12);
    });
}

// ========= 路线规划 =========
function drivingRoute() {
    return new Promise(resolve => {
        const timer = setTimeout(()=>{L('<b>⏰</b> 驾车路线 API 超时(15s)', 'warn'); resolve(null);}, 15000);
        AMap.plugin('AMap.Driving', ()=> {
            const d = new AMap.Driving({policy:0, ferry:0});
            const o = new AMap.LngLat(stops[0].lng, stops[0].lat);
            const dest = new AMap.LngLat(stops[stops.length-1].lng, stops[stops.length-1].lat);
            const wps = stops.slice(1,-1).map(s=>new AMap.LngLat(s.lng,s.lat));
            d.search(o, dest, {waypoints:wps}, (st,r)=>{
                clearTimeout(timer);
                if(st==='complete'&&r.routes?.length){
                    const path=[];
                    for(const step of r.routes[0].steps||[]){if(step.path)for(const p of step.path)path.push({lng:p.lng,lat:p.lat});}
                    resolve({path, dist:r.routes[0].distance, time:r.routes[0].time});
                } else { L(`<b>❌</b> 驾车路线失败: ${st}`, 'err'); resolve(null); }
            });
        });
    });
}

function walkSegment(from, to) {
    return new Promise(resolve => {
        const timer = setTimeout(()=>resolve(null), 8000);
        AMap.plugin('AMap.Walking', ()=> {
            const w = new AMap.Walking();
            w.search(new AMap.LngLat(from.lng,from.lat), new AMap.LngLat(to.lng,to.lat), (st,r)=>{
                clearTimeout(timer);
                if(st==='complete'&&r.routes?.length){
                    const path=[];
                    for(const step of r.routes[0].steps||[]){if(step.path)for(const p of step.path)path.push({lng:p.lng,lat:p.lat});}
                    resolve({path, dist:r.routes[0].distance, time:r.routes[0].time});
                } else resolve(null);
            });
        });
    });
}

// ========= 主流程 =========
async function main() {
    L('🚀 <b>启动</b> GreenStar v3 验证台 (纯 Canvas 渲染，无瓦片依赖)');

    // 1. NER
    const names = extractStops(PLAN);
    L(`🔍 <b>NER</b> 提取到 ${names.length} 个地标: ${names.join(' → ')}`, 'ok');

    // 2. Geocode（每个带 5 秒超时保护）
    L('📡 <b>Geocoding</b> 开始批量坐标解算（每个 5 秒超时保护）...');
    for (let i = 0; i < names.length; i++) {
        const coord = await geocode(names[i]);
        if (coord) {
            stops.push({name: names[i], ...coord});
            L(`📍 <b>#${i+1}</b> ${names[i]} → [${coord.lng.toFixed(4)}, ${coord.lat.toFixed(4)}]`, 'ok');
        } else {
            L(`❌ <b>#${i+1}</b> ${names[i]} 解算失败/超时`, 'err');
        }
    }

    // 去重
    const seen = new Set();
    stops = stops.filter(s => { if(seen.has(s.name)) return false; seen.add(s.name); return true; });

    // 渲染芯片
    const $chips = document.getElementById('chips');
    stops.forEach((s,i)=>{ $chips.innerHTML += `<div class="stop-chip"><div class="n">${i+1}</div>${s.name}</div>`; });

    // 先画直线连接
    drawMap();

    if (stops.length < 2) { L('⚠️ 有效站点不足2个', 'warn'); return; }
    document.getElementById('route-ctl').style.display = 'block';

    // 3. 尝试驾车路线
    L('🚗 <b>Driving</b> 调用 AMap.Driving 规划路线...');
    const dr = await drivingRoute();
    if (dr) {
        routePath = dr.path;
        const km = (dr.dist/1000).toFixed(1);
        const min = Math.round(dr.time/60);
        L(`✅ <b>路线</b> 驾车成功: ${km}km, ${min}分钟, ${dr.path.length} 个路径点`, 'ok');
        renderSummary('🚗 驾车', km+'km', min+'分钟');
        drawMap();
    } else {
        L('⚠️ 驾车路线失败，使用直线连接展示', 'warn');
        routePath = stops.map(s=>({lng:s.lng,lat:s.lat}));
        drawMap();
    }
}

async function switchMode() {
    const mode = document.getElementById('mode').value;
    if (mode === 'straight') {
        routePath = stops.map(s=>({lng:s.lng,lat:s.lat}));
        renderSummary('📐 直线', '—', '—');
        drawMap();
    } else if (mode === 'drive') {
        L('🚗 重新规划驾车路线...');
        const dr = await drivingRoute();
        if(dr){routePath=dr.path; renderSummary('🚗 驾车',(dr.dist/1000).toFixed(1)+'km',Math.round(dr.time/60)+'分钟'); drawMap();}
    } else if (mode === 'walk') {
        L('🚶 分段步行路线计算中...');
        routePath = [];
        let totalD=0, totalT=0;
        for(let i=0;i<stops.length-1;i++){
            const r = await walkSegment(stops[i], stops[i+1]);
            if(r){ routePath.push(...r.path); totalD+=r.dist; totalT+=r.time;
                L(`🔗 <b>#${i+1}</b> ${stops[i].name}→${stops[i+1].name}: ${(r.dist/1000).toFixed(2)}km`, 'ok');
            } else { L(`⚠️ ${stops[i].name}→${stops[i+1].name} 无解`, 'warn'); }
        }
        renderSummary('🚶 步行',(totalD/1000).toFixed(1)+'km',Math.round(totalT/60)+'分钟');
        drawMap();
    }
}

function renderSummary(title, dist, time) {
    document.getElementById('summary').innerHTML = `<div class="summary-box"><div class="row"><span>${title}</span></div><div class="row"><span>总距离</span><b>${dist}</b></div><div class="row"><span>预计耗时</span><b>${time}</b></div><div class="row"><span>站点数</span><b>${stops.length}</b></div></div>`;
}

window.addEventListener('resize', drawMap);
window.addEventListener('load', () => setTimeout(main, 200));
</script>
</body>
</html>
